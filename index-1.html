<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me | Interactive</title>
    <style>
        body {
            background: linear-gradient(135deg, #0d0d12 0%, #17171e 100%);
            color: #b0b0b0;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            align-items: center;
            padding: 0 50px;
            overflow-x: hidden;
        }

        .image-container { display: flex; justify-content: center; align-items: center; }
        
        .profile-img {
            width: 80%;
            max-width: 380px;
            border-radius: 30px;
            border: 3px solid rgba(127, 255, 212, 0.3);
            box-shadow: 0 0 20px rgba(127, 255, 212, 0.1);
            transition: all 0.5s ease;
        }

        .right-section { padding-left: 40px; }
        .main-title { color: #ffffff; font-size: 3.5rem; margin-bottom: 30px; font-weight: 900; letter-spacing: -1px; }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        /* TUGMALAR ASOSIY HOLATI */
        .btn {
            background-color: #1a1a1e;
            border: 2px solid rgba(127, 255, 212, 0.1);
            border-radius: 18px;
            padding: 25px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            outline: none;
        }

        /* YOZUVLAR YASHIRIN HOLATI */
        .label, .highlight-text {
            opacity: 0; /* Ko'rinmaydi */
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        /* KOMPYUTERDA SICHQONCHA BORSA YOKI TELEFONDA BOSILGANDA */
        .btn:hover, .btn:focus {
            background-color: #222226;
            transform: scale(1.08);
            border-color: rgba(127, 255, 212, 1);
            box-shadow: 0 0 20px rgba(127, 255, 212, 0.6), inset 0 0 10px rgba(127, 255, 212, 0.2);
        }

        /* BOSILGANDA YOZUVLAR CHIQISHI */
        .btn:hover .label, .btn:focus .label {
            opacity: 0.6;
            transform: translateY(0);
        }

        .btn:hover .highlight-text, .btn:focus .highlight-text {
            opacity: 1;
            transform: translateY(0);
            color: aquamarine;
            text-shadow: 0 0 10px aquamarine;
        }

        .label { font-size: 0.65rem; color: #ffffff; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .highlight-text { font-size: 1.1rem; font-weight: bold; }

        /* TELEFON UCHUN MOSLASHUV */
        @media screen and (max-width: 1024px) {
            body { grid-template-columns: 1fr; padding: 20px; text-align: center; }
            .right-section { padding-left: 0; margin-top: 30px; }
            .menu-grid { grid-template-columns: repeat(2, 1fr); }
            .main-title { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="IMG_20260329_013912_893.jpg" class="profile-img" alt="Jamshid">
    </div>

    <div class="right-section">
        <h1 class="main-title">Tap to Reveal</h1>
        
        <div class="menu-grid">
            <div class="btn" tabindex="0"><span class="label">Name</span><span class="highlight-text">Jamshid</span></div>
            <div class="btn" tabindex="0"><span class="label">Age</span><span class="highlight-text">17</span></div>
            <div class="btn" tabindex="0"><span class="label">Artist</span><span class="highlight-text">d4vd</span></div>
            <div class="btn" tabindex="0"><span class="label">Actor</span><span class="highlight-text">Jim Carrey</span></div>
            <div class="btn" tabindex="0"><span class="label">Profession</span><span class="highlight-text">UI/UX</span></div>
            <div class="btn" tabindex="0"><span class="label">Hobby</span><span class="highlight-text">Editing</span></div>
            <div class="btn" tabindex="0"><span class="label">Birthday</span><span class="highlight-text">20.07.2008</span></div>
            <div class="btn" tabindex="0"><span class="label">Food</span><span class="highlight-text">Somsa</span></div>
            <div class="btn" tabindex="0"><span class="label">Sport</span><span class="highlight-text">Football</span></div>
        </div>
    </div>

</body>
</html>
