<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me | Interactive Portfolio</title>
    <style>
        body {
            background: linear-gradient(135deg, #0d0d12 0%, #17171e 100%);
            color: #b0b0b0;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            overflow-x: hidden;
        }

        .main-wrapper {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            align-items: center;
            max-width: 1200px;
            width: 100%;
        }

        .image-container { display: flex; justify-content: center; align-items: center; }
        
        .profile-img {
            width: 85%;
            max-width: 380px;
            border-radius: 30px;
            border: 3px solid rgba(127, 255, 212, 0.3);
            box-shadow: 0 0 20px rgba(127, 255, 212, 0.1);
            transition: all 0.5s ease;
        }

        .right-section { padding-left: 40px; }
        .main-title { color: #ffffff; font-size: 3.5rem; margin: 0; font-weight: 900; letter-spacing: -1px; }
        .sub-title { 
            color: aquamarine; font-size: 0.9rem; margin: 10px 0 30px 0; 
            text-transform: uppercase; letter-spacing: 2px; font-weight: 500;
            text-shadow: 0 0 10px rgba(127, 255, 212, 0.3);
        }

        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }

        .btn {
            background-color: #1a1a1e;
            border: 2px solid rgba(127, 255, 212, 0.1);
            border-radius: 18px;
            padding: 22px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; outline: none;
        }

        .label, .highlight-text { opacity: 0; transform: translateY(10px); transition: all 0.3s ease; }

        .btn:hover, .btn:focus {
            background-color: #222226; transform: scale(1.05);
            border-color: rgba(127, 255, 212, 1);
            box-shadow: 0 0 20px rgba(127, 255, 212, 0.6);
        }

        .btn:hover .label, .btn:focus .label { opacity: 0.6; transform: translateY(0); }
        .btn:hover .highlight-text, .btn:focus .highlight-text { opacity: 1; transform: translateY(0); color: aquamarine; }

        .label { font-size: 0.6rem; color: #ffffff; text-transform: uppercase; margin-bottom: 5px; }
        .highlight-text { font-size: 1rem; font-weight: bold; }

        /* SOCIAL LINKS & FOOTER (JS-siz) */
        .footer {
            margin-top: 60px;
            text-align: center;
            width: 100%;
        }

        .social-icons { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        
        .social-btn {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 10px 20px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .social-btn:hover {
            background: aquamarine;
            color: #000;
            box-shadow: 0 0 15px aquamarine;
        }

        .copyright { font-size: 0.7rem; color: #555; letter-spacing: 1px; }

        @media screen and (max-width: 1024px) {
            .main-wrapper { grid-template-columns: 1fr; text-align: center; }
            .right-section { padding-left: 0; margin-top: 30px; }
            .menu-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="image-container">
            <img src="IMG_20260329_013912_893.jpg" class="profile-img" alt="Jamshid">
        </div>

        <div class="right-section">
            <h1 class="main-title">Jamshid</h1>
            <p class="sub-title">Tap to reveal my world</p>
            
            <div class="menu-grid">
                <div class="btn" tabindex="0"><span class="label">Name</span><span class="highlight-text">Jamshid</span></div>
                <div class="btn" tabindex="0"><span class="label">Age</span><span class="highlight-text">17</span></div>
                <div class="btn" tabindex="0"><span class="label">Artist</span><span class="highlight-text">d4vd</span></div>
                <div class="btn" tabindex="0"><span class="label">Actor</span><span class="highlight-text">Jim Carrey</span></div>
                <div class="btn" tabindex="0"><span class="label">Profession</span><span class="highlight-text">UI/UX</span></div>
                <div class="btn" tabindex="0"><span class="label">Director</span><span class="highlight-text">C. Nolan</span></div>
                <div class="btn" tabindex="0"><span class="label">Birthday</span><span class="highlight-text">20.07.2008</span></div>
                <div class="btn" tabindex="0"><span class="label">Food</span><span class="highlight-text">Somsa</span></div>
                <div class="btn" tabindex="0"><span class="label">Idol</span><span class="highlight-text">C. Ronaldo</span></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="social-icons">
            <a href="https://t.me/jamwid_unvrsl" class="social-btn" target="_blank">Telegram</a>
            <a href="https://instagram.com/zham.99" class="social-btn" target="_blank">Instagram</a>
            <a href="#" class="social-btn">GitHub</a>
        </div>
        <p class="copyright">© 2026 JAMSHID | BUILT WITH PASSION</p>
    </div>

</body>
</html>
