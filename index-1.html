<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamshid | Portfolio</title>
    <style>
        :root {
            --bg: #0d0d12;
            --card: #1a1a1e;
            --text: #ffffff;
            --accent: aquamarine;
            --subtext: #b0b0b0;
        }

        /* Umumiy sozlamalar - Scroll ishlashi uchun */
        html, body {
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            width: 100%;
            overflow-x: hidden; /* Yonga siljishni taqiqlaydi */
            -webkit-overflow-scrolling: touch; /* iPhone uchun yumshoq scroll */
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 40px;
            padding-bottom: 40px;
        }

        /* FLASHBANG EFFEKTI */
        #flash-toggle { display: none; }
        #flash-toggle:checked ~ .flash-overlay {
            opacity: 1;
            visibility: visible;
        }

        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.05s steps(1);
            cursor: pointer;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 1.8fr;
            gap: 40px;
            max-width: 1100px;
            width: 90%;
            position: relative;
        }

        .profile-img {
            width: 100%;
            max-width: 380px;
            border-radius: 40px;
            border: 3px solid var(--accent);
            box-shadow: 0 0 30px rgba(127, 255, 212, 0.1);
        }

        .main-title { color: var(--text); font-size: 3.5rem; margin: 0; font-weight: 900; }
        .sub-title { color: var(--accent); font-size: 1rem; letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase; }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .btn {
            background-color: var(--card);
            border: 1px solid rgba(127, 255, 212, 0.1);
            border-radius: 20px;
            padding: 25px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .label, .highlight-text { opacity: 0; transform: translateY(10px); transition: 0.3s; }
        .btn:hover { border-color: var(--accent); transform: scale(1.03); }
        .btn:hover .label, .btn:hover .highlight-text { opacity: 1; transform: translateY(0); }
        .label { font-size: 0.6rem; color: var(--subtext); text-transform: uppercase; margin-bottom: 5px; }
        .highlight-text { font-size: 1rem; font-weight: bold; color: var(--accent); }

        /* RUNAWAY FAQAT KOMPYUTERDA ISHLAYDI */
        @media (min-width: 1025px) {
            .runaway-btn:hover {
                transform: translate(100px, -50px) rotate(10deg) !important;
                background: #ff4444 !important;
                z-index: 100;
            }
        }

        .footer {
            margin-top: 50px;
            text-align: center;
            width: 100%;
            padding: 20px 0;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .social-link { color: var(--subtext); text-decoration: none; font-size: 0.8rem; margin: 0 10px; }

        /* TELEFON UCHUN MOSLASHUV */
        @media screen and (max-width: 1024px) {
            .main-container { grid-template-columns: 1fr; }
            .menu-grid { grid-template-columns: repeat(2, 1fr); }
            .main-title { font-size: 2.5rem; }
            /* Telefonda runawayni o'chiramiz, scroll muammosini yo'qotish uchun */
            .runaway-btn:hover { transform: none; background: var(--card); }
        }
    </style>
</head>
<body>

    <input type="checkbox" id="flash-toggle">
    <label for="flash-toggle" class="flash-overlay"></label>

    <div class="main-container">
        <div class="image-section">
            <img src="IMG_20260329_013912_893.jpg" class="profile-img" alt="Jamshid">
        </div>

        <div class="right-section">
            <h1 class="main-title">JAMSHID</h1>
            <p class="sub-title">Tap to explore</p>
            
            <div class="menu-grid">
                <div class="btn"><span class="label">First Name</span><span class="highlight-text">Ablakimov</span></div>
                <div class="btn"><span class="label">Last Name</span><span class="highlight-text">Jamshid</span></div>
                <div class="btn"><span class="label">Age</span><span class="highlight-text">17</span></div>
                <div class="btn"><span class="label">Profession</span><span class="highlight-text">UI/UX Designer</span></div>
                <div class="btn"><span class="label">Hobby</span><span class="highlight-text">Video Editing</span></div>

                <div class="btn runaway-btn"><span class="label"></span><span class="highlight-text">Flashbang 😂</span></div>

                <div class="btn"><span class="label">Birthday</span><span class="highlight-text">20.07.2008</span></div>
                <div class="btn"><span class="label">Idol</span><span class="highlight-text">C. Ronaldo</span></div>
                
                <label for="flash-toggle" class="btn"><span class="label">Personal</span><span class="highlight-text">Vision</span></label>

                <div class="btn"><span class="label">Director</span><span class="highlight-text">C. Nolan</span></div>
                <div class="btn"><span class="label">Actor</span><span class="highlight-text">Jim Carrey</span></div>
                <div class="btn"><span class="label">Artist</span><span class="highlight-text">d4vd</span></div>
                <div class="btn"><span class="label">Food</span><span class="highlight-text">Somsa</span></div>
                <div class="btn"><span class="label">Sport</span><span class="highlight-text">Football</span></div>
                <div class="btn"><span class="label">Number</span><span class="highlight-text">27</span></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <a href="https://t.me/jamwid_unvrsl" class="social-link" target="_blank">TELEGRAM</a>
        <a href="https://instagram.com/zham.99" class="social-link" target="_blank">INSTAGRAM</a>
        <p style="color: #444; font-size: 0.6rem; margin-top: 10px;">© 2026 JAMSHID UNVRSL</p>
    </div>

</body>
</html>
