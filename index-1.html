<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamshid | Interactive Portfolio</title>
    <style>
        :root {
            --bg: #0d0d12;
            --card: #1a1a1e;
            --text: #ffffff;
            --accent: aquamarine;
            --subtext: #b0b0b0;
        }

        /* DARK/LIGHT MODE LOGIKASI */
        #mode-toggle { display: none; }
        #mode-toggle:checked ~ .main-container {
            --bg: #f0f0f5;
            --card: #ffffff;
            --text: #1a1a1e;
            --accent: #008080;
            --subtext: #555;
        }

        body {
            background-color: var(--bg);
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            transition: 0.5s;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 1.8fr;
            gap: 40px;
            max-width: 1200px;
            width: 95%;
            padding: 40px;
            background: var(--bg);
        }

        .image-section { display: flex; justify-content: center; align-items: center; }
        
        .profile-img {
            width: 100%;
            max-width: 380px;
            border-radius: 40px;
            border: 3px solid var(--accent);
            box-shadow: 0 0 30px rgba(127, 255, 212, 0.2);
        }

        .main-title { color: var(--text); font-size: 3.5rem; margin: 0; font-weight: 900; }
        .sub-title { color: var(--accent); font-size: 1rem; letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase; }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .btn {
            background-color: var(--card);
            border: 1px solid rgba(127, 255, 212, 0.1);
            border-radius: 20px;
            padding: 25px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
        }

        .label, .highlight-text {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.05);
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent);
        }

        .btn:hover .label, .btn:hover .highlight-text {
            opacity: 1;
            transform: translateY(0);
        }

        .label { font-size: 0.65rem; color: var(--subtext); text-transform: uppercase; margin-bottom: 5px; }
        .highlight-text { font-size: 1.1rem; font-weight: bold; color: var(--accent); }

        /* MAXSUS TUGMA (THEME SWITCHER) */
        .theme-btn { cursor: pointer; border: 2px dashed var(--accent) !important; }

        .footer { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .social-link { color: var(--text); text-decoration: none; font-weight: bold; font-size: 0.9rem; transition: 0.3s; }
        .social-link:hover { color: var(--accent); }

        @media screen and (max-width: 1024px) {
            .main-container { grid-template-columns: 1fr; text-align: center; padding: 20px; }
            .menu-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <input type="checkbox" id="mode-toggle">

    <div class="main-container">
        <div class="image-section">
            <img src="IMG_20260329_013912_893.jpg" class="profile-img" alt="Jamshid">
        </div>

        <div class="right-section">
            <h1 class="main-title">JAMSHID</h1>
            <p class="sub-title">Tap to reveal my world</p>
            
            <div class="menu-grid">
                <div class="btn"><span class="label">First Name</span><span class="highlight-text">Ablakimov</span></div>
                <div class="btn"><span class="label">Last Name</span><span class="highlight-text">Jamshid</span></div>
                <div class="btn"><span class="label">Age</span><span class="highlight-text">17</span></div>
                
                <div class="btn"><span class="label">Profession</span><span class="highlight-text">UI/UX Designer</span></div>
                <div class="btn"><span class="label">Hobby</span><span class="highlight-text">Video Editing</span></div>
                <div class="btn"><span class="label">Birthday</span><span class="highlight-text">20.07.2008</span></div>

                <div class="btn"><span class="label">Idol</span><span class="highlight-text">C. Ronaldo</span></div>
                <div class="btn"><span class="label">Director</span><span class="highlight-text">C. Nolan</span></div>
                <div class="btn"><span class="label">Actor</span><span class="highlight-text">Jim Carrey</span></div>

                <div class="btn"><span class="label">Artist</span><span class="highlight-text">d4vd</span></div>
                <div class="btn"><span class="label">Food</span><span class="highlight-text">Somsa</span></div>
                <div class="btn"><span class="label">Sport</span><span class="highlight-text">Football</span></div>

                <div class="btn"><span class="label">Favorite No</span><span class="highlight-text">7</span></div>
                
                <label for="mode-toggle" class="btn theme-btn">
                    <span class="label">Theme</span>
                    <span class="highlight-text">Dark / Light</span>
                </label>

                <div class="btn"><span class="label">Status</span><span class="highlight-text">Online</span></div>
            </div>
        </div>

        <div class="footer">
            <div style="color: var(--subtext); font-size: 0.8rem;">© 2026 | BUILT BY JAMSHID</div>
            <div>
                <a href="https://t.me/jamwid_unvrsl" class="social-link" target="_blank">TELEGRAM</a> &nbsp; | &nbsp;
                <a href="https://instagram.com/jamwid.unvrsl" class="social-link" target="_blank">INSTAGRAM</a>
            </div>
        </div>
    </div>

</body>
</html>
