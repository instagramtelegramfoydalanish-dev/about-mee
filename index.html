<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHAM | Dynamic Atmosphere</title>
    <style>
        :root {
            /* Standart Neon Void holati */
            --neon: #00f3ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --title-grad: linear-gradient(to right, #00f3ff, #0088ff);
            --transition-speed: 0.8s;
        }

        /* CURRENTS ATMOSFERA (Musiqa yoqqanda aktivlashadi) */
        body.currents-mode {
            --neon: #d83a8a; /* Pushti-binafsha */
            --bg: #0a0a0c;
            --glass: rgba(216, 58, 138, 0.08);
            --title-grad: linear-gradient(to right, #f2a93b, #d83a8a, #4b306a);
            background-image: radial-gradient(circle at center, #1a0b2e 0%, #050505 100%);
        }

        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background var(--transition-speed) ease, background-image var(--transition-speed) ease;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        .main-container { max-width: 400px; width: 90%; text-align: center; z-index: 10; margin-top: -30px; }

        .profile-container {
            position: relative;
            width: 180px; height: 180px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .neon-wave {
            position: absolute;
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 2px solid var(--neon);
            box-shadow: 0 0 20px var(--neon);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.1s linear, opacity 0.5s ease, border-color 0.5s ease;
        }

        .profile-wrapper {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 2px solid var(--neon);
            padding: 5px;
            background: var(--bg);
            z-index: 2;
            cursor: pointer;
            transition: transform 0.3s ease, border-color var(--transition-speed) ease;
            overflow: hidden;
        }
        .profile-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .profile-wrapper:active { transform: scale(0.92); }

        .main-title { 
            font-size: 1.6rem; font-weight: 800; margin-bottom: 30px; 
            letter-spacing: 2px;
            background: var(--title-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: var(--transition-speed) ease;
        }

        /* MENYULAR SMOOTH TRANSITION BILAN */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .btn {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 20px; padding: 22px 10px; cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }
        .btn:hover { border-color: var(--neon); transform: translateY(-2px); }
        .btn:active { transform: scale(0.96); }
        
        .label { font-size: 0.55rem; color: #666; text-transform: uppercase; display: block; margin-bottom: 4px; letter-spacing: 1px; }
        .val { font-size: 0.9rem; font-weight: bold; color: var(--neon); letter-spacing: 1px; transition: color var(--transition-speed) ease; }

        /* MODAL VIZUALI */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.92); backdrop-filter: blur(20px); 
            display: none; align-items: center; justify-content: center; z-index: 200;
            opacity: 0; transition: opacity 0.4s ease;
        }
        .modal.active { opacity: 1; display: flex; }
        .modal-content { 
            background: #0a0a0a; width: 88%; max-width: 340px; padding: 30px; 
            border-radius: 25px; border: 1px solid var(--neon); text-align: center;
            transform: translateY(20px); transition: 0.4s ease;
        }
        .modal.active .modal-content { transform: translateY(0); }

        .social-links a { color: #fff; text-decoration: none; margin: 0 12px; font-size: 0.7rem; font-weight: 900; opacity: 0.4; transition: 0.3s; }
        .social-links a:hover { opacity: 1; color: var(--neon); }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>
    <audio id="bg-music" crossorigin="anonymous" loop src="https://files.catbox.moe/8m8p9v.mp3"></audio>

    <div class="main-container">
        <div class="profile-container">
            <div id="neon-wave" class="neon-wave"></div>
            <div class="profile-wrapper" onclick="toggleAtmosphere(event)">
                <img src="IMG_20260329_013912_893.jpg" alt="Jamshid">
            </div>
        </div>
        
        <h1 class="main-title">JAMSHID ABLAKIMOV</h1>

        <div class="menu-grid">
            <div class="btn" onclick="openModal('modal-wall')">
                <span class="label">Fikrlar uchun</span><span class="val">WALL</span>
            </div>
            <div class="btn" onclick="openModal('modal-kapsula')">
                <span class="label">Oldindan xabar</span><span class="val">KAPSULA</span>
            </div>
            <div class="btn full-btn" onclick="openModal('modal-reminder')">
                <span class="label">Shaxsiy servis</span><span class="val">ESLATMA QOLDIRISH</span>
            </div>
        </div>

        <div class="social-links">
            <a href="https://t.me/jamwidunvrsl" target="_blank">TELEGRAM</a>
            <a href="https://instagram.com/zham.99" target="_blank">INSTAGRAM</a>
        </div>
    </div>

    <div id="modal-wall" class="modal" onclick="closeModal('modal-wall')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="color:var(--neon); font-size: 1.1rem;">WALL</h2>
            <input type="text" id="wall-user" style="width:100%; background:#111; border:1px solid #222; color:#fff; padding:12px; border-radius:12px;" placeholder="Telegram Username">
            <textarea id="wall-msg" style="width:100%; background:#111; border:1px solid #222; color:#fff; padding:12px; border-radius:12px; margin-top:10px;" placeholder="Xabaringiz..."></textarea>
            <button onclick="sendToBot('wall')" style="width:100%; background:var(--neon); border:none; padding:14px; border-radius:12px; margin-top:15px; font-weight:bold; cursor:pointer;">YUBORISH</button>
        </div>
    </div>

    <script>
        const botToken = "6676999428:AAG4dXN-aBc8V2h53h9Aq63LT4B797FhEdM";
        const myChatId = "6325191171";
        
        let audioCtx, analyser, dataArray, source;
        let isPlaying = false;

        // ATMOSFERANI O'ZGARTIRISH VA MUSIQA
        function toggleAtmosphere(e) {
            burstEffect(e);
            const audio = document.getElementById('bg-music');
            const wave = document.getElementById('neon-wave');
            const body = document.body;

            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.fftSize = 64;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }

            if (audio.paused) {
                audio.play();
                body.classList.add('currents-mode'); // Currents rejimiga o'tish
                wave.style.opacity = "1";
                isPlaying = true;
                animateWave();
            } else {
                audio.pause();
                body.classList.remove('currents-mode'); // Neon Void rejimiga qaytish
                wave.style.opacity = "0";
                isPlaying = false;
            }
        }

        function animateWave() {
            if (!isPlaying) return;
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for(let i=0; i<10; i++) sum += dataArray[i];
            let average = sum / 10;

            const scale = 1 + (average / 150);
            const blur = average / 5;
            
            const wave = document.getElementById('neon-wave');
            wave.style.transform = `scale(${scale})`;
            wave.style.boxShadow = `0 0 ${20 + blur}px var(--neon)`;
            
            requestAnimationFrame(animateWave);
        }

        // --- MODAL SMOOTH TRANSITION ---
        function openModal(id) {
            const modal = document.getElementById(id);
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function closeModal(id) {
            const modal = document.getElementById(id);
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 400);
        }

        // --- BOT FUNKSIYALARI (O'zgarmadi) ---
        async function sendToBot(type) {
            let text = ""; 
            if(type === 'wall') {
                text = `🚀 **WALL**\n👤: ${document.getElementById('wall-user').value}\n💬: ${document.getElementById('wall-msg').value}`;
            }
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: myChatId, text: text })
            });
            alert("Yuborildi!"); closeModal('modal-wall');
        }

        // --- ZARRACHALAR (Rang dinamik o'zgaradi) ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor(x, y, isBurst = false) {
                this.isBurst = isBurst;
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.vx = isBurst ? (Math.random() - 0.5) * 12 : (Math.random() - 0.5) * 0.5;
                this.vy = isBurst ? (Math.random() - 0.5) * 12 : -Math.random() * 1.5;
                this.alpha = 1; this.life = isBurst ? 0.02 : 0.005;
            }
            update() { this.x += this.vx; this.y += this.vy; this.alpha -= this.life; }
            draw() { 
                ctx.globalAlpha = this.alpha; 
                ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--neon'); 
                ctx.beginPath(); ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2); ctx.fill(); 
            }
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles = particles.filter(p => p.alpha > 0);
            while(particles.length < 80) particles.push(new Particle());
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
        function burstEffect(e) {
            const rect = document.querySelector('.profile-wrapper').getBoundingClientRect();
            for(let i=0; i<30; i++) particles.push(new Particle(rect.left + 75, rect.top + 75, true));
        }
    </script>
</body>
</html>
