<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHAM | Portfolio</title>
    <style>
        :root {
            --neon: #00f3ff;
            --bg: #050505;
            --text: #ffffff;
        }

        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        .main-container { max-width: 400px; width: 90%; text-align: center; z-index: 10; }

        /* PROFIL */
        .profile-img { 
            width: 120px; height: 120px; border-radius: 40px; 
            border: 2px solid var(--neon); box-shadow: 0 0 25px rgba(0, 243, 255, 0.2);
            transition: 0.5s ease; cursor: pointer; margin-bottom: 20px;
        }
        .main-title { font-size: 2rem; font-weight: 800; margin-bottom: 30px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 243, 255, 0.5); }

        /* TUGMALAR */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 40px; }
        .btn {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 20px; padding: 20px; cursor: pointer; transition: 0.4s;
            backdrop-filter: blur(10px);
        }
        .btn:active { transform: scale(0.95); border-color: var(--neon); }
        .label { font-size: 0.6rem; color: #666; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .val { font-size: 1rem; font-weight: bold; color: var(--neon); }

        /* FOOTER */
        .social-links { margin-bottom: 20px; }
        .social-links a { color: #fff; text-decoration: none; margin: 0 15px; font-size: 0.7rem; font-weight: bold; opacity: 0.5; }
        .copyright { font-size: 0.6rem; color: #444; letter-spacing: 1px; text-transform: uppercase; }

        /* MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; z-index: 200; }
        .modal-content { background: #0a0a0a; width: 85%; max-width: 300px; padding: 30px; border-radius: 25px; border: 1px solid var(--neon); text-align: center; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="main-container">
        <img src="IMG_20260329_013912_893.jpg" class="profile-img" onclick="triggerEffect(event)">
        <h1 class="main-title" onclick="triggerEffect(event)">JAMSHID ABLAKIMOV</h1>

        <div class="menu-grid">
            <div class="btn" onclick="openModal('modal-wall', event)">
                <span class="label">Anonim xabar</span><span class="val">WALL</span>
            </div>
            <div class="btn" onclick="openModal('modal-kapsula', event)">
                <span class="label">Kelajak siri</span><span class="val">KAPSULA</span>
            </div>
        </div>

        <div class="social-links">
            <a href="https://t.me/jamwidunvrsl">TELEGRAM</a>
            <a href="https://instagram.com/zham.99">INSTAGRAM</a>
        </div>
        <p class="copyright">© 2026 JAMWIDUNVRSL | BUILD WITH PASSION</p>
    </div>

    <div id="modal-wall" class="modal" onclick="closeModal('modal-wall')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="color:var(--neon)">WALL</h2>
            <textarea id="wall-msg" placeholder="Xabaringiz..." style="width:100%; height:80px; background:#111; border:1px solid #333; color:#fff; border-radius:10px; padding:10px; resize:none;"></textarea>
            <button onclick="sendWall()" style="margin-top:15px; background:var(--neon); border:none; width:100%; padding:10px; border-radius:10px; font-weight:bold; cursor:pointer;">YUBORISH</button>
        </div>
    </div>

    <div id="modal-kapsula" class="modal" onclick="closeModal('modal-kapsula')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="color:var(--neon)">KAPSULA</h2>
            <p>Tez kunda ishga tushadi...</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.3; this.vy = (Math.random() - 0.5) * 0.3;
                this.alpha = Math.random() * 0.4 + 0.1; this.target = null;
            }
            update() {
                if(this.target) {
                    this.x += (this.target.x - this.x) * 0.08; this.y += (this.target.y - this.y) * 0.08;
                    this.alpha -= 0.015; if(this.alpha <= 0) this.reset();
                } else {
                    this.x += this.vx; this.y += this.vy;
                    if(this.x<0 || this.x>canvas.width) this.vx*=-1; if(this.y<0 || this.y>canvas.height) this.vy*=-1;
                }
            }
            draw() { ctx.globalAlpha = this.alpha; ctx.fillStyle = '#00f3ff'; ctx.beginPath(); ctx.arc(this.x, this.y, 1.2, 0, Math.PI*2); ctx.fill(); }
        }

        for(let i=0; i<80; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        function triggerEffect(e) {
            let x = e.touches ? e.touches[0].clientX : e.clientX;
            let y = e.touches ? e.touches[0].clientY : e.clientY;
            particles.forEach(p => p.target = { x: x, y: y });
            setTimeout(() => particles.forEach(p => p.target = null), 1000);
        }

        window.addEventListener('mousedown', triggerEffect);
        window.addEventListener('touchstart', triggerEffect);

        function openModal(id, e) { e.stopPropagation(); triggerEffect(e); document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function sendWall() {
            const msg = document.getElementById('wall-msg').value;
            if(!msg) return;
            alert("Yuborildi!"); closeModal('modal-wall');
        }
    </script>
</body>
</html>
