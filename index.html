<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHAM | Neon Void</title>
    <style>
        :root {
            --neon: #00f3ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* FON ZARRACHALARI */
        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }

        /* ASOSIY KARTA */
        .card {
            background: var(--glass);
            width: 85%;
            max-width: 340px;
            padding: 30px;
            border-radius: 28px;
            text-align: center;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 243, 255, 0.15);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        .profile-img {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 2px solid var(--neon);
            padding: 5px;
            box-shadow: 0 0 20px var(--neon);
            object-fit: cover;
            cursor: pointer;
        }

        h1 { font-size: 22px; margin: 15px 0 5px; }
        .role { color: var(--neon); font-size: 11px; letter-spacing: 3px; margin-bottom: 25px; text-transform: uppercase; }

        /* IJTIMOIY TUGMALAR */
        .social-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .social-link {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px;
            color: white;
            text-decoration: none;
            font-size: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        /* MODAL OYNALAR (KAPSULA VA WALL UCHUN) */
        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            display: none; /* Dastlab yopiq */
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-content {
            background: var(--glass);
            width: 80%;
            max-width: 300px;
            padding: 30px;
            border-radius: 25px;
            border: 1px solid var(--neon);
            text-align: center;
            box-shadow: 0 0 30px var(--neon);
        }

        .close-btn {
            margin-top: 20px;
            background: var(--neon);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        /* PASTKI NAVIGATSIYA */
        .bottom-nav {
            position: fixed;
            bottom: 30px;
            width: 90%;
            max-width: 380px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .nav-btn {
            background: var(--glass);
            border: 1px solid rgba(0, 243, 255, 0.2);
            padding: 14px;
            border-radius: 20px;
            color: white;
            text-align: center;
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .btn-title { display: block; font-weight: bold; font-size: 13px; color: var(--neon); }
        .btn-desc { font-size: 9px; color: #777; margin-top: 3px; }

        .active-glow { box-shadow: 0 0 40px var(--neon) !important; transform: scale(0.96); }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="card">
        <img src="IMG_20260329_013912_893.jpg" class="profile-img" onclick="trigger(this)">
        <h1>Jamshid Ablakimov</h1>
        <div class="role">UI/UX & Video Editor</div>
        
        <div class="social-row">
            <a href="https://t.me/jamwid_unvrsl" class="social-link" onclick="trigger(this)">TELEGRAM</a>
            <a href="https://instagram.com/zham.99" class="social-link" onclick="trigger(this)">INSTAGRAM</a>
        </div>
        <div style="font-size: 9px; color: #444; letter-spacing: 2px;">© 2026 JAMSHID.UNVRSL BUILD WITH PASSION</div>
    </div>

    <div id="modal-kapsula" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--neon);">KAPSULA</h2>
            <p style="font-size: 14px;">Kelajak uchun xabar qoldirish tizimi yaqinda ishga tushadi.</p>
            <button class="close-btn" onclick="closeModal('modal-kapsula')">YOPISH</button>
        </div>
    </div>

    <div id="modal-wall" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--neon);">WALL</h2>
            <p style="font-size: 14px;">Anonim fikrlar devori tayyorlanmoqda.</p>
            <button class="close-btn" onclick="closeModal('modal-wall')">YOPISH</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn" onclick="openModal('modal-kapsula', this)">
            <span class="btn-title">KAPSULA</span>
            <span class="btn-desc">Kelajakka xat</span>
        </div>
        <div class="nav-btn" onclick="openModal('modal-wall', this)">
            <span class="btn-title">WALL</span>
            <span class="btn-desc">Anonim devor</span>
        </div>
    </div>

    <script>
        // ZARRACHALAR LOGIKASI
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.7;
                this.vy = (Math.random() - 0.5) * 0.7;
                this.alpha = Math.random();
                this.target = null;
            }
            update() {
                if(this.target) {
                    this.x += (this.target.x - this.x) * 0.12;
                    this.y += (this.target.y - this.y) * 0.12;
                    this.alpha -= 0.02;
                    if(this.alpha <= 0) this.reset();
                } else {
                    this.x += this.vx; this.y += this.vy;
                }
            }
            draw() {
                ctx.globalAlpha = this.alpha; ctx.fillStyle = '#00f3ff';
                ctx.beginPath(); ctx.arc(this.x, this.y, 1.2, 0, Math.PI*2); ctx.fill();
            }
        }

        for(let i=0; i<70; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // OYNALARNI BOSHQARISH
        function openModal(id, btn) {
            // Zarrachalarni tugmaga yig'ish
            const rect = btn.getBoundingClientRect();
            particles.forEach(p => p.target = {x: rect.left + rect.width/2, y: rect.top + rect.height/2});
            
            btn.classList.add('active-glow');
            setTimeout(() => {
                document.getElementById(id).style.display = 'flex';
                btn.classList.remove('active-glow');
                particles.forEach(p => p.target = null);
            }, 600);
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        function trigger(el) {
            const rect = el.getBoundingClientRect();
            particles.forEach(p => p.target = {x: rect.left + rect.width/2, y: rect.top + rect.height/2});
            el.classList.add('active-glow');
            setTimeout(() => {
                el.classList.remove('active-glow');
                particles.forEach(p => p.target = null);
            }, 800);
        }
    </script>
</body>
</html>
