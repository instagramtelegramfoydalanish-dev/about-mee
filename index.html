<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHAM | Digital Architect</title>
    <style>
        :root {
            --neon: #00f3ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }

        /* ASOSIY KARTA */
        .card {
            background: var(--glass);
            width: 85%;
            max-width: 340px;
            padding: 30px;
            border-radius: 28px;
            text-align: center;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 243, 255, 0.15);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--neon);
            padding: 5px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
            object-fit: cover;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h1 { font-size: 22px; margin: 15px 0 5px; letter-spacing: 1px; }
        .role { color: var(--neon); font-size: 11px; letter-spacing: 3px; margin-bottom: 25px; text-transform: uppercase; font-weight: 300; }

        /* SKILLS (MAHORATLAR) */
        .skills-container {
            text-align: left;
            margin-bottom: 25px;
        }

        .skill-item { margin-bottom: 12px; }
        .skill-label { font-size: 10px; color: #888; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .skill-bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
        .skill-bar-fill { height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); border-radius: 2px; }

        /* IJTIMOIY TUGMALAR */
        .social-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .social-link {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px;
            color: white;
            text-decoration: none;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .social-link:active { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }

        .passion { font-size: 9px; color: #444; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }

        /* NAVIGATSIYA */
        .bottom-nav {
            position: fixed;
            bottom: 30px;
            width: 90%;
            max-width: 380px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .nav-btn {
            background: var(--glass);
            border: 1px solid rgba(0, 243, 255, 0.2);
            padding: 14px;
            border-radius: 20px;
            color: white;
            text-align: center;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-title { display: block; font-weight: bold; font-size: 13px; color: var(--neon); letter-spacing: 1px; }
        .btn-desc { font-size: 9px; color: #777; margin-top: 3px; }

        .active-glow { box-shadow: 0 0 40px var(--neon) !important; transform: scale(0.96); }

    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="card">
        <img src="IMG_20260329_013912_893.jpg" class="profile-img" id="profile-trigger">
        <h1>Jamshid Ablakimov</h1>
        <div class="role">UI/UX & Video Editor</div>

        <div class="skills-container">
            <div class="skill-item">
                <div class="skill-label"><span>UI/UX DESIGN</span><span>90%</span></div>
                <div class="skill-bar-bg"><div class="skill-bar-fill" style="width: 90%"></div></div>
            </div>
            <div class="skill-item">
                <div class="skill-label"><span>VIDEO EDITING</span><span>85%</span></div>
                <div class="skill-bar-bg"><div class="skill-bar-fill" style="width: 85%"></div></div>
            </div>
            <div class="skill-item">
                <div class="skill-label"><span>DEVELOPMENT</span><span>75%</span></div>
                <div class="skill-bar-bg"><div class="skill-bar-fill" style="width: 75%"></div></div>
            </div>
        </div>

        <div class="social-row">
            <a href="https://t.me/jamwid_unvrsl" class="social-link" onclick="trigger(this)">TELEGRAM</a>
            <a href="https://instagram.com/zham.99" class="social-link" onclick="trigger(this)">INSTAGRAM</a>
        </div>

        <div class="passion">Build with passion</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-btn" onclick="trigger(this, 'KAPSULA')">
            <span class="btn-title">KAPSULA</span>
            <span class="btn-desc">Future Message</span>
        </div>
        <div class="nav-btn" onclick="trigger(this, 'WALL')">
            <span class="btn-title">WALL</span>
            <span class="btn-desc">Anonymous Wall</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.7;
                this.vy = (Math.random() - 0.5) * 0.7;
                this.alpha = Math.random();
                this.target = null;
            }
            update() {
                if(this.target) {
                    this.x += (this.target.x - this.x) * 0.12;
                    this.y += (this.target.y - this.y) * 0.12;
                    this.alpha -= 0.02;
                    if(this.alpha <= 0) this.reset();
                } else {
                    this.x += this.vx; this.y += this.vy;
                    if(this.x<0 || this.x>canvas.width) this.vx*=-1;
                    if(this.y<0 || this.y>canvas.height) this.vy*=-1;
                }
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#00f3ff';
                ctx.beginPath(); ctx.arc(this.x, this.y, 1.2, 0, Math.PI*2); ctx.fill();
            }
        }

        for(let i=0; i<70; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        function trigger(el, type) {
            const rect = el.getBoundingClientRect();
            const tx = rect.left + rect.width/2;
            const ty = rect.top + rect.height/2;
            particles.forEach(p => p.target = {x: tx, y: ty});
            el.classList.add('active-glow');
            setTimeout(() => {
                el.classList.remove('active-glow');
                particles.forEach(p => p.target = null);
            }, 800);
        }

        document.getElementById('profile-trigger').addEventListener('click', function() { trigger(this); });
    </script>
</body>
</html>
