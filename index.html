<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHAM | Neon Void</title>
    <style>
        :root {
            --bg: #0a0a0e;
            --card: #16161a;
            --text: #ffffff;
            --accent: aquamarine;
            --subtext: #555;
            --neon-shadow: 0 0 15px rgba(127, 255, 212, 0.3);
        }

        html, body {
            background-color: var(--bg);
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            color: var(--text);
            overflow-x: hidden;
        }

        body { display: block; min-height: 100vh; padding: 50px 0; }
        .hide-input { display: none; }

        /* VOID REACHED (FINAL SCREEN) */
        #final-toggle:checked ~ .main-container {
            opacity: 0; visibility: hidden; transform: scale(0.95); transition: 1s ease;
        }
        .limit-message {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; opacity: 0; visibility: hidden; transition: 1.2s ease 0.5s; z-index: 10;
        }
        .limit-message h2 { font-size: 3.5rem; font-weight: 900; letter-spacing: 12px; margin: 0; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .limit-message p { color: var(--subtext); font-size: 1.1rem; margin-top: 20px; }
        #final-toggle:checked ~ .limit-message { opacity: 1; visibility: visible; }

        /* ASOSIY KONTEYNER */
        .main-container { max-width: 1000px; width: 90%; margin: 0 auto; transition: 0.8s; }
        .image-section { text-align: center; margin-bottom: 20px; }
        .profile-img { 
            width: 100%; max-width: 320px; border-radius: 50px; 
            border: 2px solid var(--accent); 
            box-shadow: var(--neon-shadow);
            transition: all 0.5s ease;
        }
        .profile-img:hover { filter: brightness(0.3); box-shadow: 0 0 0px transparent; border-color: #222; }
        
        .main-title { font-size: 3.5rem; margin: 0; font-weight: 900; text-align: center; }
        .sub-title { color: var(--accent); font-size: 0.8rem; letter-spacing: 4px; text-transform: uppercase; text-align: center; margin-bottom: 40px; }

        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }

        /* TUGMALAR */
        .btn {
            background-color: var(--card); border: 1px solid #222; border-radius: 20px; padding: 25px 10px;
            text-align: center; cursor: pointer; display: flex; flex-direction: column; justify-content: center;
            transition: all 0.4s ease; box-shadow: var(--neon-shadow); position: relative;
        }
        .btn:hover { box-shadow: 0 0 5px rgba(127, 255, 212, 0.1); border-color: #444; }

        .label, .val { opacity: 0; transform: translateY(10px); transition: 0.3s; }

        /* ZANJIR LOGIKASI: Birini bossa, oldingisi yo'qoladi */
        /* Radio button ishlatamiz, shunda faqat bittasi aktiv bo'ladi */
        .hide-input:checked + .btn {
            background: transparent;
            border-color: transparent;
            box-shadow: none;
            cursor: default;
        }
        .hide-input:checked + .btn .label, 
        .hide-input:checked + .btn .val {
            opacity: 1;
            transform: translateY(0);
            color: var(--accent);
        }

        /* THE END - Qolganlari bilan bir xil ko'rinadi */
        .end-wrapper { grid-column: 2 / 3; margin-top: 20px; }
        .end-btn { border: 1px solid #222; } /* dashed olib tashlandi */

        .label { font-size: 0.6rem; color: var(--subtext); text-transform: uppercase; margin-bottom: 5px; }
        .val { font-size: 1.1rem; font-weight: bold; }

        .footer { text-align: center; padding: 40px 0; border-top: 1px solid #111; margin-top: 50px; }
        .social-link { color: var(--subtext); text-decoration: none; font-size: 0.8rem; margin: 0 15px; font-weight: bold; }
        .social-link:hover { color: var(--accent); }

        @media screen and (max-width: 900px) {
            .menu-grid { grid-template-columns: repeat(2, 1fr); }
            .end-wrapper { grid-column: span 2; }
            .main-title { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
